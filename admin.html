<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>历史 · 管理 · 0x7EA</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/lottery.css">
<style>
  html, body { overflow: auto; }
  .page { height: auto; min-height: 100vh; }
</style>
</head>
<body>
<a class="back" href="index.html">← 返回</a>

<div class="page">
  <div class="topbar">
    <span class="brand">0x7EA // ADMIN</span>
    <span class="subtitle">历史记录 · 导出 · 重置</span>
  </div>

  <div style="margin: 3vh 0; display: flex; flex-direction: column; gap: 12px;">
    <div class="summary" id="summary"></div>
    <div class="btn-row">
      <button class="btn primary" id="btn-export">导 出 CSV</button>
      <button class="btn violet" id="btn-remove-last">删 除 最 后 一 条</button>
      <button class="btn danger" id="btn-reset">重 置 全 部</button>
    </div>
  </div>

  <div class="history">
    <table>
      <thead>
        <tr>
          <th>序号</th>
          <th>奖项</th>
          <th>号码</th>
          <th>时间</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="statusbar">
    <span>// ADMIN CONSOLE</span>
    <span class="hint">R 重置 · ESC 返回</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/hex.js"></script>
<script src="js/state.js"></script>
<script>
  const PRIZE_NAMES = { first: '一等奖', second: '二等奖', third: '三等奖' };
  const PRIZE_CLASS = { first: 'prize-first', second: 'prize-second', third: 'prize-third' };

  function render() {
    const records = State.load();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    records.forEach((r, i) => {
      const tr = document.createElement('tr');
      const hex = '0x' + r.hex.toString(16).toUpperCase().padStart(3, '0');
      const era = r.era === 'BC' ? '公元前' : '公元后';
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td class="${PRIZE_CLASS[r.prize] || ''}">${PRIZE_NAMES[r.prize] || r.prize}</td>
        <td>${era} ${hex} 纪元</td>
        <td>${new Date(r.time).toLocaleString('zh-CN')}</td>
        <td><button class="btn" data-idx="${i}" style="padding:4px 12px; font-size:12px;">删除</button></td>
      `;
      tbody.appendChild(tr);
    });

    const first = State.count('first');
    const second = State.count('second');
    const third = State.count('third');
    const total = State.count();
    document.getElementById('summary').innerHTML = `
      <span>// 总计 <strong>${total}</strong> / 42</span>
      <span>一等奖 <strong>${first}</strong> / 2</span>
      <span>二等奖 <strong>${second}</strong> / 10</span>
      <span>三等奖 <strong>${third}</strong> / 30</span>
      <span>剩余池 <strong>${State.remaining()}</strong> / 1024</span>
    `;

    tbody.querySelectorAll('button[data-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-idx'), 10);
        if (confirm(`确认删除第 ${idx + 1} 条？`)) {
          State.remove(idx);
          render();
          showToast('已删除');
        }
      });
    });
  }

  function showToast(msg, danger) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (danger ? ' danger' : '');
    setTimeout(() => toast.className = 'toast', 1800);
  }

  document.getElementById('btn-export').addEventListener('click', () => {
    const csv = '﻿' + State.toCSV(); // UTF-8 BOM，Excel 识别
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `lottery-0x7EA-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('btn-remove-last').addEventListener('click', () => {
    if (!State.load().length) return showToast('没有记录', true);
    if (confirm('确认删除最后一条抽奖记录？')) {
      State.removeLast(1);
      render();
      showToast('已删除');
    }
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('确认重置所有抽奖记录？此操作不可撤销。')) return;
    if (!confirm('再次确认 · 所有 42 个中奖号码将被清除。继续？')) return;
    State.reset();
    render();
    showToast('已重置');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') location.href = 'index.html';
    else if (e.key === 'r' || e.key === 'R') {
      document.getElementById('btn-reset').click();
    }
  });

  render();
</script>
</body>
</html>
