<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>历史 · 后台 · 0x7EA</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/lottery.css">
<style>
  html, body { overflow: auto; }
  .page { height: auto; min-height: 100vh; }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <span class="brand">0x7EA // ADMIN</span>
    <span class="subtitle">历史记录 · 导出 · 重置</span>
  </div>

  <div class="summary" id="summary" style="margin: 24px 0;"></div>

  <div class="history">
    <table>
      <thead>
        <tr>
          <th style="width: 60px;">序号</th>
          <th style="width: 120px;">奖项</th>
          <th>号码</th>
          <th style="width: 220px;">时间</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="statusbar">
    <span>// ADMIN CONSOLE</span>
    <span class="hint">&nbsp;</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/hex.js"></script>
<script src="js/state.js"></script>
<script src="js/manual.js"></script>
<script>
  const PRIZE_NAMES = { grand: '特等奖', first: '一等奖', second: '二等奖', third: '三等奖' };
  const PRIZE_CLASS = { grand: 'prize-grand', first: 'prize-first', second: 'prize-second', third: 'prize-third' };

  let selectedIdx = -1;

  function render() {
    const records = State.load();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (records.length === 0) {
      selectedIdx = -1;
    } else if (selectedIdx < 0 || selectedIdx >= records.length) {
      selectedIdx = Math.max(0, Math.min(selectedIdx, records.length - 1));
      if (records.length > 0 && selectedIdx < 0) selectedIdx = 0;
    }

    records.forEach((r, i) => {
      const tr = document.createElement('tr');
      if (i === selectedIdx) tr.classList.add('selected');
      const hex = '0x' + r.hex.toString(16).toUpperCase().padStart(3, '0');
      const era = r.era === 'BC' ? '公元前' : '公元后';
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td class="${PRIZE_CLASS[r.prize] || ''}">${PRIZE_NAMES[r.prize] || r.prize}</td>
        <td>${era} ${hex} 纪元</td>
        <td>${new Date(r.time).toLocaleString('zh-CN')}</td>
      `;
      tr.addEventListener('click', () => { selectedIdx = i; render(); });
      tbody.appendChild(tr);
    });

    const grand = State.count('grand');
    const first = State.count('first');
    const second = State.count('second');
    const third = State.count('third');
    const total = State.count();
    document.getElementById('summary').innerHTML = `
      <span>// 总计 <strong>${total}</strong> / 42</span>
      <span>特等奖 <strong>${grand}</strong> / 2</span>
      <span>一等奖 <strong>${first}</strong> / 10</span>
      <span>二等奖 <strong>${second}</strong> / 10</span>
      <span>三等奖 <strong>${third}</strong> / 20</span>
      <span>剩余池 <strong>${State.remaining()}</strong> / 1024</span>
      <span>选中 <strong>${selectedIdx >= 0 ? '#' + (selectedIdx + 1) : '—'}</strong></span>
    `;

    // 滚动选中行到可见区域
    if (selectedIdx >= 0) {
      const row = tbody.children[selectedIdx];
      if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  function showToast(msg, danger) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (danger ? ' danger' : '');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.className = 'toast', 1800);
  }

  function exportCSV() {
    const records = State.load();
    if (!records.length) return showToast('暂无记录可导出', true);
    const csv = '﻿' + State.toCSV();
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `lottery-0x7EA-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('已导出 CSV');
  }

  function deleteSelected() {
    const records = State.load();
    if (!records.length) return showToast('暂无记录', true);
    if (selectedIdx < 0 || selectedIdx >= records.length) return showToast('请先用 ↑↓ 选择一条', true);
    const r = records[selectedIdx];
    const hex = '0x' + r.hex.toString(16).toUpperCase().padStart(3, '0');
    const era = r.era === 'BC' ? '公元前' : '公元后';
    const name = `${PRIZE_NAMES[r.prize]} · ${era} ${hex} 纪元`;
    if (!confirm(`确认删除第 ${selectedIdx + 1} 条？\n\n${name}`)) return;
    State.remove(selectedIdx);
    // 保持选中位置：删除后索引不变（会自动落到原位置的下一条）
    render();
    showToast('已删除');
  }

  function resetAll() {
    if (!State.load().length) return showToast('已是空状态', true);
    if (!confirm('确认重置所有抽奖记录？此操作不可撤销。')) return;
    if (!confirm('再次确认 · 所有中奖号码将被清除。继续？')) return;
    State.reset();
    selectedIdx = -1;
    render();
    showToast('已重置');
  }

  function moveSelection(delta) {
    const records = State.load();
    if (!records.length) return;
    if (selectedIdx < 0) selectedIdx = delta > 0 ? 0 : records.length - 1;
    else selectedIdx = Math.max(0, Math.min(records.length - 1, selectedIdx + delta));
    render();
  }

  Manual.init([
    { keys: ['↑'], desc: '选择上一条' },
    { keys: ['↓'], desc: '选择下一条' },
    { keys: ['Home'], desc: '选择第一条' },
    { keys: ['End'], desc: '选择最后一条' },
    { keys: ['D'], desc: '删除当前选中条目（二次确认）' },
    { keys: ['Delete'], desc: '同上' },
    { keys: ['E'], desc: '导出 CSV 到下载目录' },
    { keys: ['R'], desc: '重置全部（两次确认）' },
    { keys: ['B'], desc: '返回主页' },
    { keys: ['H'], desc: '显示本手册（再按一次关闭）' },
  ]);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveSelection(-1); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); moveSelection(1); }
    else if (e.key === 'Home') { e.preventDefault(); selectedIdx = 0; render(); }
    else if (e.key === 'End')  { e.preventDefault(); selectedIdx = State.load().length - 1; render(); }
    else if (e.key === 'd' || e.key === 'D' || e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault(); deleteSelected();
    }
    else if (e.key === 'e' || e.key === 'E') { e.preventDefault(); exportCSV(); }
    else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetAll(); }
    else if (e.key === 'b' || e.key === 'B') location.href = 'index.html';
  });

  // 默认选中第一条
  if (State.load().length > 0) selectedIdx = 0;
  render();
</script>
</body>
</html>
