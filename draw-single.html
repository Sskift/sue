<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>抽 · 一等奖 · 0x7EA</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/lottery.css">
</head>
<body>
<div class="code-deco left">
[prize] = FIRST
[quota] = 2
[mode]  = single
</div>

<div class="page">
  <div class="topbar">
    <span class="brand">0x7EA // 一等奖</span>
    <span class="subtitle" id="stage-hint">待命</span>
  </div>

  <div class="hero">
    <div class="number-display">
      <span class="prefix">公元</span>
      <span class="era-reel" id="era-reel"></span>
      <span>0x</span>
      <span class="hex-reel" id="hex-0"></span>
      <span class="hex-reel" id="hex-1"></span>
      <span class="hex-reel" id="hex-2"></span>
      <span class="suffix">纪元</span>
    </div>
  </div>

  <div class="statusbar">
    <span>// FIRST PRIZE · single draw</span>
    <span class="hint">&nbsp;</span>
  </div>
</div>

<div class="confetti" id="confetti"></div>
<div class="toast" id="toast"></div>

<script src="js/hex.js"></script>
<script src="js/state.js"></script>
<script src="js/roller.js"></script>
<script src="js/manual.js"></script>
<script src="js/single.js"></script>
<script>
  Manual.init([
    { keys: ['Space'], desc: '开始 / 停止滚动（方向完成后自动进入年份阶段）' },
    { keys: ['Enter'], desc: '年份完成后：过渡归零，抽下一名' },
    { keys: ['A'], desc: '进入历史记录（后台管理 / 导出 / 重置）' },
    { keys: ['B'], desc: '返回主页' },
    { keys: ['H'], desc: '显示本手册（再按一次关闭）' },
  ], [
    {
      title: '一等奖抽取步骤（每名）',
      steps: [
        '<kbd>Space</kbd> 开始方向滚动',
        '<kbd>Space</kbd> 定格「前/后」（自动进入年份阶段）',
        '<kbd>Space</kbd> 开始年份滚动',
        '<kbd>Space</kbd> 定格三位十六进制 → 号码自动入库',
        '<kbd>Enter</kbd> 过渡归零，准备下一名',
      ],
    },
  ]);
</script>
</body>
</html>
