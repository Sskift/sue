<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>十连抽 · 0x7EA</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/lottery.css">
</head>
<body>

<div class="page">
  <div class="topbar">
    <span class="brand">0x7EA // <span id="prize-label">十连抽</span></span>
    <span class="subtitle" id="stage-hint">待命</span>
  </div>

  <div class="grid-10" id="grid"></div>

  <div class="statusbar">
    <span>// TEN-SHOT DRAW · 10 numbers per round</span>
    <span class="hint">&nbsp;</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/hex.js"></script>
<script src="js/state.js"></script>
<script src="js/roller.js"></script>
<script src="js/manual.js"></script>
<script src="js/ten.js"></script>
<script>
  Manual.init([
    { keys: ['Space'], desc: '开始 / 停止滚动（10 格同时）' },
    { keys: ['Enter'], desc: '停止后：确认并归档本轮 10 个号码（归零过渡）' },
    { keys: ['A'], desc: '进入历史记录（后台管理 / 导出 / 重置）' },
    { keys: ['B'], desc: '返回主页' },
    { keys: ['H'], desc: '显示本手册（再按一次关闭）' },
  ], [
    {
      title: '十连抽流程（每轮）',
      steps: [
        '<kbd>Space</kbd> 开始 10 格同时滚动',
        '<kbd>Space</kbd> 所有格依次定格',
        '<kbd>Enter</kbd> 归档本轮 10 个号码 → 过渡归零',
      ],
    },
    {
      title: '二等奖共 10 名（1 轮）',
      steps: [
        '本页完成 1 轮十连 → 二等奖完成',
      ],
    },
    {
      title: '三等奖共 30 名（3 轮，编号 01-30 累计）',
      steps: [
        '第 1 轮：编号 01-10',
        '过渡归零后自动进入第 2 轮：编号 11-20',
        '再一次：第 3 轮编号 21-30',
      ],
    },
  ]);
</script>
</body>
</html>
